<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 法師等級鑑定</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const questions = [
      {
        q: '你使用 AI 工具的頻率？',
        options: ['幾乎沒用過', '偶爾用一下', '幾乎每天使用', 'AI 已完全融入日常工作流程']
      },
      {
        q: '你下提示詞（Prompt）的方式？',
        options: ['直接輸入問題，沒有特別設計', '會稍微調整措辭', '會給角色、背景、格式等指令', '有一套自己的提示詞模板庫']
      },
      {
        q: '當 AI 給出答案，你會怎麼處理？',
        options: ['直接使用', '大概看一下再用', '會查證關鍵資訊', '系統性驗證，能辨識幻覺與偏差']
      },
      {
        q: '你使用過幾種不同的 AI 模型或工具？',
        options: ['只用過一種（如 ChatGPT）', '用過 2–3 種', '用過 4 種以上並比較差異', '會依任務選擇最適合的模型']
      },
      {
        q: '你有沒有用 AI 解決過實際工作或生活問題？',
        options: ['還沒有', '有試過但效果普通', '有，解決了具體問題', '有，並且持續產出可重複使用的成果']
      },
      {
        q: '你對 AI 自動化或串接工具的熟悉程度？',
        options: ['不了解', '聽過但沒實作', '做過簡單自動化（如 Zapier、Make）', '能串接 API 或部署給他人使用']
      },
      {
        q: '你如何看待 AI 在你專業領域的應用？',
        options: ['還不確定 AI 能幫什麼', '知道一些應用場景', '已在工作中落地應用', '能設計 AI 輔助的工作流程並教導他人']
      },
    ];

    const ranks = ['初階 AI 法師', '中階 AI 法師', '高階 AI 法師', '大法師', '賢者'];
    const skills = ['提示詞咒文學', '知識召喚術', '自動化陣法', '幻覺辨識術', '商業解題術', '人機協作術'];
    const equips = ['ChatGPT 法杖', 'Claude 秘典', 'Perplexity 水晶球', 'Notion 卷軸', 'Python 鍊金台'];

    const roadmap = {
      '初階 AI 法師': { next: '中階 AI 法師', skills: ['提示詞咒文學', '幻覺辨識術'], gear: ['Claude 秘典', 'Perplexity 水晶球'] },
      '中階 AI 法師': { next: '高階 AI 法師', skills: ['商業解題術', '人機協作術'], gear: ['Notion 卷軸'] },
      '高階 AI 法師': { next: '大法師', skills: ['自動化陣法', '人機協作術'], gear: ['Python 鍊金台'] },
      '大法師':       { next: '賢者', skills: ['策略思維', '教學引導'], gear: ['智慧冠冕'] },
      '賢者':         { next: '已達頂階', skills: [], gear: [] }
    };

    function App() {
      const [step, setStep] = useState(0);
      const [score, setScore] = useState(0);
      const [mySkills, setMySkills] = useState([]);
      const [myGear, setMyGear] = useState([]);
      const [showShare, setShowShare] = useState(false);

      // 7 題，每題 0–3 分，滿分 21 分，切成 5 階
      // 0–4: 初階, 5–9: 中階, 10–14: 高階, 15–18: 大法師, 19–21: 賢者
      const thresholds = [5, 10, 15, 19, 22];
      const idx = thresholds.findIndex(t => score < t);
      const rank = ranks[idx];
      const plan = roadmap[rank];

      if (step < questions.length) {
        const item = questions[step];
        return (
          <div className="min-h-screen bg-slate-950 text-white flex items-center justify-center px-4 py-8">
            <div className="w-full max-w-xl bg-white/10 rounded-2xl p-5 sm:p-8">
              {/* progress bar */}
              <div className="flex gap-1 mb-6">
                {questions.map((_, i) => (
                  <div key={i} className={`h-1 flex-1 rounded-full transition-all ${i < step ? 'bg-indigo-400' : i === step ? 'bg-indigo-600' : 'bg-slate-700'}`} />
                ))}
              </div>
              <div className="text-xs text-slate-400 mb-2 text-right">{step + 1} / {questions.length}</div>
              <h1 className="text-xl sm:text-3xl font-bold mb-5 text-center">AI 法師等級鑑定</h1>
              <p className="mb-5 text-base sm:text-lg leading-relaxed">{item.q}</p>
              <div className="grid gap-3">
                {item.options.map((op, i) => (
                  <button
                    key={i}
                    onClick={() => { setScore(score + i); setStep(step + 1); }}
                    className="p-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-sm sm:text-base text-left transition-all"
                  >
                    {op}
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-950 text-white px-4 py-6 sm:p-6">
          <div className="max-w-6xl mx-auto">

            {/* 三欄卡片：手機單欄，桌機三欄 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 sm:gap-6">

              {/* 階級卡 */}
              <div className="bg-white/10 rounded-2xl p-5 sm:p-6">
                <div className="text-xs text-slate-400 mb-1 tracking-widest">你的階級</div>
                <h2 className="text-2xl sm:text-3xl font-bold mb-2">{rank}</h2>
                <p className="text-sm text-slate-300 mb-4">根據你的作答結果，這是你目前的 AI 法師等級。</p>
                <div className="flex flex-wrap gap-2">
                  <button
                    onClick={() => { setStep(0); setScore(0); setMySkills([]); setMyGear([]); }}
                    className="px-4 py-2 rounded-xl bg-slate-700 hover:bg-slate-600 active:scale-95 text-sm transition-all"
                  >
                    🔄 重新鑑定
                  </button>
                  <button
                    onClick={() => setShowShare(true)}
                    className="px-4 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-sm transition-all"
                  >
                    📤 分享成果
                  </button>
                </div>
              </div>

              {/* 技能裝備盤點 */}
              <div className="bg-white/10 rounded-2xl p-5 sm:p-6">
                <h2 className="text-base sm:text-xl font-semibold mb-3">盤點你的技能與裝備</h2>
                <p className="text-xs text-slate-400 mb-3">點選你已掌握的項目</p>
                <p className="text-sm font-medium mb-2">⚡ 技能</p>
                <div className="grid grid-cols-2 gap-2 mb-4">
                  {skills.map(s => (
                    <button
                      key={s}
                      onClick={() => setMySkills(v => v.includes(s) ? v.filter(x => x !== s) : [...v, s])}
                      className={`p-2 rounded-xl text-xs sm:text-sm text-center transition-all active:scale-95 ${mySkills.includes(s) ? 'bg-emerald-600' : 'bg-slate-800 hover:bg-slate-700'}`}
                    >
                      {s}
                    </button>
                  ))}
                </div>
                <p className="text-sm font-medium mb-2">🔧 裝備</p>
                <div className="grid grid-cols-2 gap-2">
                  {equips.map(e => (
                    <button
                      key={e}
                      onClick={() => setMyGear(v => v.includes(e) ? v.filter(x => x !== e) : [...v, e])}
                      className={`p-2 rounded-xl text-xs sm:text-sm text-center transition-all active:scale-95 ${myGear.includes(e) ? 'bg-amber-600' : 'bg-slate-800 hover:bg-slate-700'}`}
                    >
                      {e}
                    </button>
                  ))}
                </div>

                {/* 盤點成果段落 */}
                {(mySkills.length > 0 || myGear.length > 0) && (
                  <div className="mt-5 pt-4 border-t border-white/10">
                    <p className="text-sm font-semibold mb-3 text-slate-200">✨ 你的盤點成果</p>
                    {mySkills.length > 0 && (
                      <div className="mb-3">
                        <p className="text-xs text-slate-400 mb-1.5">已掌握技能 ({mySkills.length})</p>
                        <div className="flex flex-wrap gap-1.5">
                          {mySkills.map(s => (
                            <span key={s} className="px-2 py-1 bg-emerald-700/60 text-emerald-200 rounded-full text-xs">⚡ {s}</span>
                          ))}
                        </div>
                      </div>
                    )}
                    {myGear.length > 0 && (
                      <div>
                        <p className="text-xs text-slate-400 mb-1.5">已備齊裝備 ({myGear.length})</p>
                        <div className="flex flex-wrap gap-1.5">
                          {myGear.map(g => (
                            <span key={g} className="px-2 py-1 bg-amber-700/60 text-amber-200 rounded-full text-xs">🔧 {g}</span>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* 升階建議 */}
              <div className="bg-white/10 rounded-2xl p-5 sm:p-6">
                <h2 className="text-base sm:text-xl font-semibold mb-3">升階建議</h2>
                <div className="text-xs text-slate-400 mb-3">下一階 → <span className="text-indigo-300 font-semibold">{plan.next}</span></div>
                <p className="text-sm font-semibold mb-2">建議成長技能</p>
                <ul className="mb-4 space-y-1">
                  {plan.skills.length > 0
                    ? plan.skills.map(s => <li key={s} className="text-sm text-slate-300 flex items-center gap-2"><span className="text-indigo-400">▸</span>{s}</li>)
                    : <li className="text-sm text-slate-500">已達頂階，無需再升</li>}
                </ul>
                <p className="text-sm font-semibold mb-2">建議補齊裝備</p>
                <ul className="space-y-1">
                  {plan.gear.length > 0
                    ? plan.gear.map(g => <li key={g} className="text-sm text-slate-300 flex items-center gap-2"><span className="text-amber-400">▸</span>{g}</li>)
                    : <li className="text-sm text-slate-500">裝備已齊全</li>}
                </ul>
              </div>

            </div>

            {/* ── Full Roadmap ── */}
            <div className="mt-6 bg-white/5 rounded-2xl p-4 sm:p-6">
              <h2 className="text-sm sm:text-lg font-semibold mb-5 text-center tracking-widest text-slate-300">⚔️ AI 法師成長路線圖</h2>

              {/* 桌機：橫向；手機：直向 */}
              <div className="hidden md:flex items-stretch gap-0">
                {ranks.map((r, i) => {
                  const isCurrent = r === rank;
                  const isPast = i < idx;
                  const info = roadmap[r];
                  return (
                    <div key={r} className="flex items-center flex-1">
                      <div className={`flex-1 rounded-2xl p-3 border-2 transition-all h-full
                        ${isCurrent ? 'border-indigo-400 bg-indigo-500/20 shadow-lg shadow-indigo-500/20'
                          : isPast ? 'border-emerald-700 bg-emerald-900/20 opacity-70'
                          : 'border-slate-700 bg-white/5 opacity-40'}`}
                      >
                        <div className="text-xs text-slate-400 mb-1">
                          {isPast ? '✅ 已達成' : isCurrent ? '📍 你在這裡' : '🔒 未解鎖'}
                        </div>
                        <div className={`font-bold text-xs mb-2 ${isCurrent ? 'text-indigo-300' : isPast ? 'text-emerald-400' : 'text-slate-500'}`}>
                          {r}
                        </div>
                        <div className="text-xs text-slate-400 leading-relaxed">
                          {info.skills.map(s => <span key={s} className="inline-block mr-1 mb-1 px-1.5 py-0.5 bg-slate-700 rounded-full">{s}</span>)}
                        </div>
                        <div className="text-xs text-amber-500/70 mt-1">
                          {info.gear.map(g => <span key={g} className="inline-block mr-1 mb-1">🔧{g}</span>)}
                        </div>
                      </div>
                      {i < ranks.length - 1 && <div className="text-slate-600 text-lg mx-1 flex-shrink-0">›</div>}
                    </div>
                  );
                })}
              </div>

              {/* 手機：直向 timeline */}
              <div className="flex md:hidden flex-col gap-0">
                {ranks.map((r, i) => {
                  const isCurrent = r === rank;
                  const isPast = i < idx;
                  const info = roadmap[r];
                  return (
                    <div key={r} className="flex gap-3">
                      {/* timeline 軸 */}
                      <div className="flex flex-col items-center">
                        <div className={`w-3 h-3 rounded-full mt-1 flex-shrink-0 ${isCurrent ? 'bg-indigo-400' : isPast ? 'bg-emerald-500' : 'bg-slate-600'}`} />
                        {i < ranks.length - 1 && <div className={`w-0.5 flex-1 my-1 ${isPast ? 'bg-emerald-700' : 'bg-slate-700'}`} />}
                      </div>
                      {/* 內容 */}
                      <div className={`flex-1 rounded-xl p-3 mb-2 border transition-all
                        ${isCurrent ? 'border-indigo-400 bg-indigo-500/20'
                          : isPast ? 'border-emerald-800 bg-emerald-900/20 opacity-70'
                          : 'border-slate-800 bg-white/5 opacity-40'}`}
                      >
                        <div className="text-xs text-slate-400 mb-0.5">
                          {isPast ? '✅ 已達成' : isCurrent ? '📍 你在這裡' : '🔒 未解鎖'}
                        </div>
                        <div className={`font-bold text-sm mb-1 ${isCurrent ? 'text-indigo-300' : isPast ? 'text-emerald-400' : 'text-slate-500'}`}>
                          {r}
                        </div>
                        {(info.skills.length > 0 || info.gear.length > 0) && (
                          <div className="text-xs text-slate-400 flex flex-wrap gap-1">
                            {info.skills.map(s => <span key={s} className="px-1.5 py-0.5 bg-slate-700 rounded-full">{s}</span>)}
                            {info.gear.map(g => <span key={g} className="text-amber-500/70">🔧{g}</span>)}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

            </div>
          </div>
        </div>

        {/* ── Share Modal ── */}
        {showShare && (
          <div
            className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 px-4"
            onClick={() => setShowShare(false)}
          >
            <div
              className="w-full max-w-sm bg-slate-900 rounded-3xl overflow-hidden shadow-2xl"
              onClick={e => e.stopPropagation()}
            >
              {/* 截圖區域 */}
              <div className="bg-gradient-to-br from-indigo-950 via-slate-900 to-slate-950 px-6 py-8">
                {/* Header */}
                <div className="text-center mb-6">
                  <div className="text-3xl mb-2">🧙‍♂️</div>
                  <div className="text-xs tracking-widest text-indigo-400 mb-1">AI 法師等級鑑定</div>
                  <h2 className="text-2xl font-bold text-white">{rank}</h2>
                </div>

                {/* 分隔線 */}
                <div className="border-t border-white/10 mb-5" />

                {/* 技能成果 */}
                {mySkills.length > 0 && (
                  <div className="mb-4">
                    <p className="text-xs text-slate-400 mb-2 tracking-wide">⚡ 已掌握技能</p>
                    <div className="flex flex-wrap gap-1.5">
                      {mySkills.map(s => (
                        <span key={s} className="px-2.5 py-1 bg-emerald-800/70 text-emerald-200 rounded-full text-xs">{s}</span>
                      ))}
                    </div>
                  </div>
                )}

                {/* 裝備成果 */}
                {myGear.length > 0 && (
                  <div className="mb-4">
                    <p className="text-xs text-slate-400 mb-2 tracking-wide">🔧 已備齊裝備</p>
                    <div className="flex flex-wrap gap-1.5">
                      {myGear.map(g => (
                        <span key={g} className="px-2.5 py-1 bg-amber-800/70 text-amber-200 rounded-full text-xs">{g}</span>
                      ))}
                    </div>
                  </div>
                )}

                {/* 升階目標 */}
                <div className="mb-5">
                  <p className="text-xs text-slate-400 mb-2 tracking-wide">🎯 下一個目標</p>
                  <p className="text-sm text-indigo-300 font-semibold">{plan.next}</p>
                  {plan.skills.length > 0 && (
                    <p className="text-xs text-slate-400 mt-1">待解鎖：{plan.skills.join('、')}</p>
                  )}
                </div>

                {/* 分隔線 */}
                <div className="border-t border-white/10 mb-4" />

                {/* Footer */}
                <div className="text-center">
                  <p className="text-xs text-slate-500">你也來測測看你的 AI 法師等級吧 🔮</p>
                </div>
              </div>

              {/* 關閉按鈕 */}
              <div className="px-6 py-4 bg-slate-900">
                <button
                  onClick={() => setShowShare(false)}
                  className="w-full py-2.5 rounded-xl bg-slate-700 hover:bg-slate-600 active:scale-95 text-sm transition-all"
                >
                  關閉
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
